name: Build Android APK (example)
on:
  push:
    branches: [ 'main', 'master' ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-venv openjdk-17-jdk build-essential ccache git zip unzip
          python3 -m pip install --upgrade pip
          python3 -m pip install buildozer cython
      - name: Build APK
        run: |
          buildozer android debug
