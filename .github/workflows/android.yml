name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Accept Android SDK licenses
        run: |
          mkdir -p $HOME/.android
          yes | $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses --sdk_root=$HOME/.buildozer/android/platform/android-sdk

      - name: Install Android Build Tools
        run: |
          $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager "build-tools;36.1.0" "platforms;android-33" --sdk_root=$HOME/.buildozer/android/platform/android-sdk

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython
      - name: Build APK
        run: |
          buildozer android debug
