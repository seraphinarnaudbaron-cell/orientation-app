name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"   # Buildozer + p4a stable

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-dev python3-setuptools python3-pip \
          openjdk-17-jdk \
          unzip zip \
          libffi-dev libssl-dev \
          autoconf automake libtool pkg-config \
          git

    - name: Install Buildozer and Python deps
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Prepare Android SDK directory
      run: |
        mkdir -p ~/.android
        echo "### User Sources for Android SDK Manager" > ~/.android/repositories.cfg

    - name: Build APK
      run: buildozer android debug
