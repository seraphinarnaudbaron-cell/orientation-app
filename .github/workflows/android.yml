name: Build Android APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-20.04   # !!! CRUCIAL : fonctionne avec buildozer

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            zip \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            automake \
            autoconf \
            libtool \
            pkg-config

      - name: Install Buildozer & Cython
        run: |
          python -m pip install --upgrade pip
          pip install wheel
          pip install buildozer cython

      - name: Build APK
        run: |
          buildozer android debug
